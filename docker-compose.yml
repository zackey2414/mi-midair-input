# Intel Mac 等でのローカル実行用。詳しい手順は DOCKER.md を参照。
services:
  # Web アプリ (テキスト / 手書き検索)。http://localhost:8000
  web:
    build:
      context: .
    image: midair-input:latest
    platform: linux/amd64
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # 画像 + index をホストと共有 (永続)
    restart: unless-stopped

  # 初回のみ: OpenMoji 取得 + FAISS index 構築 (./data に書き出す)。
  #   docker compose --profile setup run --rm prepare
  prepare:
    image: midair-input:latest
    build:
      context: .
    platform: linux/amd64
    profiles: ["setup"]
    volumes:
      - ./data:/app/data
    command: >
      sh -lc "python packages/emoji-search/scripts/download_openmoji.py &&
              python packages/emoji-search/scripts/build_index.py"
