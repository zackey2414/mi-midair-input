[project]
name = "emoji-search"
version = "0.1.0"
description = "絵文字入力: OpenMoji + CLIP + FAISS によるマルチモーダル絵文字検索"
requires-python = ">=3.12"
dependencies = [
    "midair-shared",
    "torch",
    "transformers",
    "pillow",
    "numpy",
    "tqdm",
]

[tool.uv.sources]
midair-shared = { workspace = true }
torch = { index = "pytorch-cpu" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/emoji_search"]
