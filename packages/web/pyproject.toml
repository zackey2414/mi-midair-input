[project]
name = "midair-web"
version = "0.1.0"
description = "Mid-Air input 検索 Web アプリ (テキスト / 手書き入力、非同期バックグラウンド検索)"
requires-python = ">=3.12"
dependencies = [
    "midair-shared",
    "emoji-search",
    "fastapi",
    "uvicorn",
]

[project.scripts]
midair-web = "midair_web.__main__:main"

[tool.uv.sources]
midair-shared = { workspace = true }
emoji-search = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/midair_web"]
